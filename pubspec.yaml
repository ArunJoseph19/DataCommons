name: data_commons
description: "DataCommons — Crowdsourced smartphone sensor data platform"
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Maps (FREE - OpenStreetMap)
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Charts
  fl_chart: ^0.70.2

  # Local DB
  sqflite: ^2.4.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Sensors
  sensors_plus: ^6.1.1
  geolocator: ^13.0.2
  pedometer: ^4.0.2

  # Camera
  camera: ^0.11.0+2
  image_picker: ^1.1.2

  # Permissions
  permission_handler: ^11.3.1

  # Background
  flutter_background_service: ^5.0.12

  # Firebase
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.2
  cloud_firestore: ^5.6.7
  firebase_storage: ^12.4.5

  # Utilities
  path_provider: ^2.1.5
  share_plus: ^10.1.4
  uuid: ^4.5.1
  intl: ^0.20.2
  connectivity_plus: ^6.1.2
  flutter_secure_storage: ^9.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
